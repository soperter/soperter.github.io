<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeJoy Games | 游戏工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: #0a0a0a url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path fill="%231a1a2e" d="M1 3h1v1H1V3zm2-2h1v1H3V1z"/></svg>');
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .glow-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00d4ff, #ff00ff, #ffdd00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(255, 0, 255, 0.3);
            margin-bottom: 1.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.3); }
        }
        .subtitle {
            font-size: 1.3rem;
            color: #a0a0c0;
            margin-bottom: 3rem;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 1rem 2.5rem;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.7);
            transform: translateY(-3px);
        }
        .btn-secondary {
            background: transparent;
            border-color: #ff00ff;
            color: #ff00ff;
        }
        .btn-secondary:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }
        .footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }
        /* 响应式适配手机 */
        @media (max-width: 768px) {
            .glow-title { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .btn { padding: 0.8rem 1.8rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <h1 class="glow-title">LeJoy Games</h1>
    <p class="subtitle">
        专注于创造充满乐趣与惊喜的独立游戏<br>
        用代码编织幻想，用交互传递快乐
    </p>
    <div class="btn-group">
        <a href="#" class="btn btn-primary">即将上线</a>
        <a href="#" class="btn btn-secondary">关注我们</a>
    </div>
    <div class="footer">
        © 2026 LeJoy Games | Powered by GitHub Pages
    </div>
</body>
</html>
